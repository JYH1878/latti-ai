name: CI

on:
  push:
    branches: [main, dev]
    tags: ['v*']
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-test:
    runs-on: [self-hosted, linux, gpu]
    defaults:
      run:
        shell: bash
    container:
      image: localhost:5000/latti-ai-ci:latest
      options: --gpus all
      volumes:
        - /opt/heongpu-cache:/opt/heongpu-cache
        - /opt/go-mod-cache:/root/go/pkg/mod
    timeout-minutes: 120

    steps:
      - name: Configure git proxy
        run: git config --global url."https://ghfast.top/https://github.com/".insteadOf "https://github.com/"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Detect CUDA architecture
        id: cuda-arch
        run: |
          if [ -n "${LATTISENSE_CUDA_ARCH}" ]; then
            echo "arch=${LATTISENSE_CUDA_ARCH}" >> "$GITHUB_OUTPUT"
          else
            ARCH=$(nvidia-smi --query-gpu=compute_cap --format=csv,noheader | head -1 | tr -d '.')
            echo "Auto-detected CUDA arch: ${ARCH}"
            echo "arch=${ARCH}" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify prerequisites
        run: |
          echo "=== Tool versions ==="
          gcc --version | head -1
          g++ --version | head -1
          cmake --version | head -1
          go version
          python3 --version
          echo "=== GPU ==="
          nvidia-smi --query-gpu=name,driver_version,memory.total --format=csv,noheader
          echo "=== CUDA arch: ${{ steps.cuda-arch.outputs.arch }} ==="

      - name: Configure git mirrors
        run: |
          git config --global url."https://gitee.com/mirrors/cccl.git".insteadOf "https://github.com/nvidia/cccl.git"

      - name: Build HEonGPU (cached)
        run: |
          CUDA_ARCH="${{ steps.cuda-arch.outputs.arch }}"
          HEONGPU_COMMIT=$(git -C inference/lattisense/HEonGPU rev-parse HEAD)
          CACHE_DIR="/opt/heongpu-cache/${HEONGPU_COMMIT}-arch${CUDA_ARCH}"
          if [ -d "${CACHE_DIR}/install/lib" ]; then
            echo "Using cached HEonGPU (${HEONGPU_COMMIT:0:8}, arch=${CUDA_ARCH})"
            cp -a "${CACHE_DIR}/install" inference/lattisense/HEonGPU/install
            cp -a "${CACHE_DIR}/build" inference/lattisense/HEonGPU/build
          else
            echo "Building HEonGPU from scratch (arch=${CUDA_ARCH})"
            cd inference/lattisense/HEonGPU
            rm -rf build install
            cmake -S . -B build \
              -DCMAKE_CUDA_ARCHITECTURES=${CUDA_ARCH} \
              -DCMAKE_CUDA_COMPILER=/usr/local/cuda/bin/nvcc \
              -DCMAKE_INSTALL_PREFIX=$(pwd)/install
            cmake --build build -j$(nproc)
            cmake --install build
            cd $GITHUB_WORKSPACE
            mkdir -p "${CACHE_DIR}"
            cp -a inference/lattisense/HEonGPU/install "${CACHE_DIR}/"
            cp -a inference/lattisense/HEonGPU/build "${CACHE_DIR}/"
            # Keep only the 3 most recent caches
            ls -dt /opt/heongpu-cache/*/ 2>/dev/null | tail -n +4 | xargs rm -rf 2>/dev/null || true
          fi

      - name: Build (GPU mode)
        run: |
          CUDA_ARCH="${{ steps.cuda-arch.outputs.arch }}"
          mkdir -p build && cd build
          cmake .. -DINFERENCE_SDK_ENABLE_GPU=ON -DLATTISENSE_CUDA_ARCH=${CUDA_ARCH}
          make -j$(nproc)

      - name: Run compiler tests
        run: |
          cd build/inference/unittests
          python3 ../../../training/model_compiler/unittests/test_compiler.py

      - name: Run E2E tests (GPU)
        timeout-minutes: 30
        run: |
          cd build/inference/unittests
          ./test_e2e "[e2e][gpu]"

      - name: Generate example instructions
        run: |
          python3 inference/interface/gen_mega_ag.py --task-dir examples/test_mnist/task
          python3 inference/interface/gen_mega_ag.py --task-dir examples/test_cifar10/task

      - name: Run example tests (GPU only)
        timeout-minutes: 60
        run: |
          cd build
          ctest -R "example-(mnist|cifar10)-gpu" -V

  build-docker:
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    runs-on: [self-hosted, linux, gpu]
    defaults:
      run:
        shell: bash
    container:
      image: localhost:5000/latti-ai-ci:latest
      volumes:
        - /var/run/docker.sock:/var/run/docker.sock
    needs: build-and-test
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write

    steps:
      - name: Configure git proxy
        run: git config --global url."https://ghfast.top/https://github.com/".insteadOf "https://github.com/"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build Docker image
        run: docker build -t latti-ai:latest .

      - name: Verify Docker image (CPU mode)
        timeout-minutes: 30
        run: |
          docker run --rm latti-ai:latest bash -c "
            cd /workspace/build
            cmake ..
            make -j\$(nproc)
            cd inference/unittests
            python test_gen_layers.py TestLayerExport.test_sq
            ./test_data_structs
            ./test_fhe_layers_hetero 'sq*'
            cd /workspace
            python -m pytest training/model_compiler/unittests/test_compiler.py -v
          "

      - name: Tag and push
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          docker tag latti-ai:latest "${IMAGE}:latest"
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            docker tag latti-ai:latest "${IMAGE}:${{ github.ref_name }}"
            docker push "${IMAGE}:${{ github.ref_name }}"
          fi
          docker push "${IMAGE}:latest"

      - name: Cleanup
        if: always()
        run: docker image prune -f
